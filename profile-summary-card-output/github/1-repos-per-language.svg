<svg xmlns="http://www.w3.org/2000/svg" width="340" height="200" viewBox="0 0 340 200" role="img">
  <style>
    text { font-family: Segoe UI, Ubuntu, Helvetica Neue, Arial, sans-serif; }
    .title { fill: #0969da; font-size: 20px; font-weight: 600; }
    .subtitle { fill: #57606a; font-size: 10px; }
    .language { fill: #24292f; font-size: 12px; font-weight: 600; }
    .value { fill: #57606a; font-size: 11px; }
  </style>
  <rect x="1" y="1" width="338" height="198" rx="6" fill="#ffffff" stroke="#d0d7de"/>
  <text x="24" y="34" class="title">Top Languages by Repo</text>
  <text x="24" y="53" class="subtitle">55 non-fork repos | public + private</text>
  <g>
