    <text x="316" y="128" text-anchor="end" class="value">14.5%</text>
  </g>
  <g>
    <text x="24" y="152" class="language">Python</text>
    <rect x="118" y="142" width="150" height="10" rx="5" fill="#eff2f5"/>
    <rect x="118" y="142" width="100" height="10" rx="5" fill="#3572A5"><title>Python: 8 repositories</title></rect>
    <text x="316" y="152" text-anchor="end" class="value">14.5%</text>
  </g>
  <g>
    <text x="24" y="176" class="language">HTML</text>
    <rect x="118" y="166" width="150" height="10" rx="5" fill="#eff2f5"/>
    <rect x="118" y="166" width="88" height="10" rx="5" fill="#e34c26"><title>HTML: 7 repositories</title></rect>
    <text x="316" y="176" text-anchor="end" class="value">12.7%</text>
