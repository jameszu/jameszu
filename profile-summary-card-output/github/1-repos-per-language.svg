    <rect x="118" y="70" width="150" height="10" rx="5" fill="#eff2f5"/>
    <rect x="118" y="70" width="150" height="10" rx="5" fill="#f1e05a"><title>JavaScript: 12 repositories</title></rect>
    <text x="316" y="80" text-anchor="end" class="value">21.8%</text>
  </g>
  <g>
    <text x="24" y="104" class="language">TypeScript</text>
    <rect x="118" y="94" width="150" height="10" rx="5" fill="#eff2f5"/>
    <rect x="118" y="94" width="125" height="10" rx="5" fill="#3178c6"><title>TypeScript: 10 repositories</title></rect>
    <text x="316" y="104" text-anchor="end" class="value">18.2%</text>
  </g>
  <g>
    <text x="24" y="128" class="language">Other</text>
    <rect x="118" y="118" width="150" height="10" rx="5" fill="#eff2f5"/>
